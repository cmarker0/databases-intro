apiVersion: v1
kind: ConfigMap
metadata:
  name: init-users-script
data:
  init-users.sh: |
    #!/bin/sh
    set -e

    USERS="oliver alexander andreas borgar erling kari nore christian"

    for user in $USERS; do
      echo "==> Setting up: $user"

      # Create role (ignore error if already exists)
      psql -c "CREATE USER \"$user\" WITH PASSWORD '$user';" 2>/dev/null \
        && echo "    Created user: $user" \
        || echo "    User already exists: $user"

      # Create database owned by the user (ignore error if already exists)
      psql -c "CREATE DATABASE \"$user\" OWNER \"$user\";" 2>/dev/null \
        && echo "    Created database: $user" \
        || echo "    Database already exists: $user"

      # Ensure ownership and full privileges on the database
      psql -c "ALTER DATABASE \"$user\" OWNER TO \"$user\";"
      psql -c "GRANT ALL PRIVILEGES ON DATABASE \"$user\" TO \"$user\";"

      # Grant full rights on the public schema within the database
      psql -d "$user" -c "GRANT ALL ON SCHEMA public TO \"$user\";"
      psql -d "$user" -c "ALTER SCHEMA public OWNER TO \"$user\";"
    done

    echo "==> Init complete."
